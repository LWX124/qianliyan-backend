    <meta charset="utf-8"/>
    <title>图片备注</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<body>

<input type="hidden" id="adress" value="${appSendOutSheet.adress}">
<input type="hidden" id="ids" value="${appSendOutSheet.id}">


<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
    <legend>填写备注</legend>
</fieldset>
<form class="layui-form" action="">
    <div class="layui-form-item">
        <label class="layui-form-label">备注：</label>
        <div class="layui-input-block">
            <input type="text" style="margin-right: 20px" id="remake" name="remake" lay-verify="title" autocomplete="off"
                   placeholder="请输入" class="layui-input">
        </div>
    </div>
</form>

<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
    <legend>上传图片</legend>
</fieldset>

<button type="button" class="layui-btn" id="img1" style="margin-left: 40px">
    <i class="layui-icon">&#xe67c;</i>上传图片
</button>

<button type="button" class="layui-btn layui-btn-fluid" onclick="suball()" style="margin-top: 40px">确认派单</button>

<script src="../../../static/common/layui/layui.js" charset="utf-8"></script>
<script src="../../../static/common/js/jquery-1.11.1.min.js"></script>
<script src="http://www.jq22.com/jquery/jquery-ui-1.11.0.js"></script>
<script>


    var src;
    layui.use(['upload'], function () {
        // lavar layer = layui.layer;
        var $ = layui.jquery
            , upload = layui.upload;


        var uploadInst = upload.render({
            url: '${ctx}/app/appSendOutSheet/upload'
            , elem: '#img1'
            , ext: 'jpg|png|gif'
            , before: function (input) {
                //返回的参数item，即为当前的input DOM对象
                layer.msg('文件上传中');
            }
            , done: function (res) {
                if (res.code > 0) {
                    return layer.msg('上传失败');
                }
                var s = $.trim(res.data.src);
                src = s;
                layer.msg('文件上传成功');
            }
        });
    });

    function suball() {
        var adress = $("#adress").val();
        var id = $("#ids").val();
        //获取到备注中的文字
        var remake = document.getElementById("remake").value


        //提交数据
        //先检查数据
        if (src == "") {
            layer.msg('请上传图片');
        } else {
            //获取到各种参数
            //派单给理赔老师
            $.ajax({
                type: "POST",
                url: "${ctx}/app/appSendOutSheet/addSendOutSheet",
                data: {
                    address: adress,
                    id: id,
                    remark: remake,
                    url:src,
                },
                dataType: "json",
                success: function (data) {
                    if ($.trim(data.stat) == "success") {
                        layer.msg('派单成功');
                        //关闭所有弹出层
                    } else {
                        layer.msg('派单失败,操作失败请联系管理员', {icon: 5});
                    }
                },
                error: function (data) {
                    layer.msg("操作失败请联系管理员")
                }
            });
        }

     }
