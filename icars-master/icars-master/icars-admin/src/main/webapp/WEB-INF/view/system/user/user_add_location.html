@layout("/common/_container.html"){
		<div id="userLocationInfoForm" style="height: 100%;">
			<div id="container" style="height: 100%;overflow: inherit !important;"></div>
			<label style="width: 215px;height: 25px;left: 100px;position: absolute;top: 100px;background: #fff;">
				<input type="text" name="search" id="search" value="" style="float: right;margin-top: 2px" />
				<div onclick="search()" style="line-height: 27px;margin-left: 9px;">搜索</div>
			</label>

			<div class="row btn-group-m-t">
				<div class="col-sm-12" style="text-align: center">
					<#button btnCss="info" name="确定" id="ensure" icon="fa-check" clickFun="AddUserLocation.fillLocation()"/>
					<#button btnCss="danger" name="取消" id="cancel" icon="fa-eraser" clickFun="AddUserLocation.close()"/>
				</div>
			</div>
		</div>


<script type="text/javascript" src="http://api.map.baidu.com/api?v=1.8&ak=zHIiuacGQPHdzAnC8cMl4CyEq4uyG48H"></script>
<!--<script src="js/jquery-2.1.0.js" type="text/javascript" charset="utf-8"></script>-->
<script type="text/javascript">

    $('.wrapper-content').css('height','90%');

    var map = new BMap.Map("container"); // 创建地图实例
    var point = new BMap.Point(116.404, 39.915); // 创建点坐标
    map.centerAndZoom(point, 15); // 初始化地图，设置中心点坐标和地图级别
    map.enableScrollWheelZoom(true); //开启鼠标滚轮缩放
    //			map.centerAndZoom(new BMap.Point(116.404, 39.915), 11);
    var local = new BMap.LocalSearch(map, {
        renderOptions: {
            map: map
        }
    });

    function search() {
        var value = $('#search').val();
        console.log(value);
        local.search(value);
        map.centerAndZoom(new BMap.Point(116.404, 39.915), 11);
        // 创建地址解析器实例
        var myGeo = new BMap.Geocoder();
        // 将地址解析结果显示在地图上，并调整地图视野
        myGeo.getPoint(value, function(point) {
                if(point) {
                    console.log('经纬度:', point)
                    AddUserLocation.lng = point.lng;
                    AddUserLocation.lat = point.lat;
                    map.centerAndZoom(point, 16);
                    map.addOverlay(new BMap.Marker(point));
                }
            },
            "北京市");
    }
</script>
<script src="${ctxPath}/static/modular/system/user/user_add_location.js"></script>

<!--</script>-->
@}
