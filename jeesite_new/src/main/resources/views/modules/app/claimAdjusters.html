<!--上传多张图片，备注。多选派单-->
<fieldset class="layui-elem-field layui-field-title" style="margin-top: 20px;">
    <legend>上传图片</legend>
</fieldset>

<button type="button" class="layui-btn" id="img1" style="margin-left: 80px">
    <i class="layui-icon">&#xe67c;</i>上传图片
</button>

<br>
<br>
<form class="layui-form" action="">
    <div class="layui-form-item">
        <label class="layui-form-label">备注：</label>
        <div class="layui-input-block">
            <input type="text" style="margin-right: 20px" id="remake" name="remake" lay-verify="title" autocomplete="off"
                   placeholder="请输入" class="layui-input">
        </div>
    </div>
</form>



<script src="../../../static/common/layui/layui.js" charset="utf-8"></script>
<!--<script src="https://code.jquery.com/jquery-1.12.4.js"></script>-->

<script src="http://www.jq22.com/jquery/jquery-ui-1.11.0.js"></script>
<script>

    var src;
    layui.use(['form','table','upload'], function(){
        var form = layui.form
            ,layer = layui.layer
            ,table = layui.table;

        var $ = layui.jquery
            ,upload = layui.upload;



        $("#pai_dan").on('click',function(){
            //获取到图片，备注内容
            var remake = document.getElementById("remake").value
            //sosid
            var sendId = $("#sendId").val();

            $.ajax({
                type: "POST",
                url: "${ctx}/app/appSendOutSheet/addSendOutSheet",
                data: {
                    sendId: sendId,
                    remark: remake,
                    url:src,
                },
                dataType: "json",
                success: function (data) {
                    if ($.trim(data.stat) == "success") {
                        layer.msg('派单成功');
                        //关闭所有弹出层
                        src="";
                    } else {
                        layer.msg('派单失败,操作失败请联系管理员', {icon: 5});
                    }
                },
                error: function (data) {
                    layer.msg("操作失败请联系管理员")
                }
            })
        });

        function getReportIds(obj) {
            var str=obj.map(function(elem,index){
                return elem.id;
            }).join(",");
            alert(str);
            return str;
        }

        //普通图片上传
        var uploadInst = upload.render({
            elem: '#img1'
            ,url: '${ctx}/app/appSendOutSheet/upload' //改成您自己的上传接口
            ,before: function(obj){
                //预读本地文件示例，不支持ie8
                obj.preview(function(index, file, result){
                    $('#demo1').attr('src', result); //图片链接（base64）
                });
            }
            ,done: function(res){
                //如果上传失败
                if(res.code > 0){
                    return layer.msg('上传失败');
                }
                //上传成功
                var s = $.trim(res.data.src);
                src = s;
                layer.msg('文件上传成功');
            }
            ,error: function(){
                //演示失败状态，并实现重传
                var demoText = $('#demoText');
                demoText.html('<span style="color: #FF5722;">上传失败</span> <a class="layui-btn layui-btn-xs demo-reload">重试</a>');
                demoText.find('.demo-reload').on('click', function(){
                    uploadInst.upload();
                });
            }
        });


        //监听头工具栏事件
        table.on('toolbar(test)', function(obj){
            var checkStatus = table.checkStatus(obj.config.id)
                ,data = checkStatus.data; //获取选中的数据
            switch(obj.event){
                case 'add':
                    layer.msg('添加');
                    break;
                case 'update':
                    if(data.length === 0){
                        layer.msg('请选择一行');
                    } else if(data.length > 1){
                        layer.msg('只能同时编辑一个');
                    } else {
                        layer.alert('编辑 [id]：'+ checkStatus.data[0].id);
                    }
                    break;
                case 'delete':
                    if(data.length === 0){
                        layer.msg('请选择一行');
                    } else {
                        layer.msg('删除');
                    }
                    break;
            };
        });

        //监听行工具事件
        table.on('tool(test)', function(obj){ //注：tool 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
            var data = obj.data //获得当前行数据
                ,layEvent = obj.event; //获得 lay-event 对应的值
            if(layEvent === 'detail'){
                //layer.msg('查看操作');
                //派单给这个理赔老师，经纬度，位置信息。
                var sendId = $("#sendId").val();

                //弹窗上传图片，传递数据，上传返回地址，提交，再新建数据
                layer.open({
                    type: 2,
                    title: '选择图片和备注',
                    shadeClose: true,
                    shade: 0.8,
                    area: ['600px', '60%'],
                    content: '${ctx}/app/appSendOutSheet/sendSingle?sendId='+sendId+'&id='+data.id+''
                    //iframe的url

                    //content: '${ctx}/app/forward/test?accId='+accId+'&type='+type+'' //ifram
                });



                //派单给理赔老师
                // $.ajax({
                //     type:"GET",
                //     url:"${ctx}/app/appSendOutSheet/addSendOutSheet?address="+adress+"&lat="+lat+"&lng="+lng+"&id="+data.id+"",
                //     success:function (data) {
                //         if ($.trim(data.stat) == "success") {
                //             layer.msg('派单成功');
                //         } else {
                //             layer.msg('派单失败,操作失败请联系管理员', {icon: 5});
                //         }
                //     },
                //     error:function(data){
                //         layer.msg("操作失败请联系管理员")
                //     }
                // });


            } else if(layEvent === 'del'){
                layer.confirm('真的删除行么', function(index){
                    obj.del(); //删除对应行（tr）的DOM结构
                    layer.close(index);
                    //向服务端发送删除指令
                    $.ajax({
                        type:"GET",
                        url:"${ctx}/app/appYearCheckIndent/delYearCheckMerchants?userBid="+data.id+"",
                        success:function (data) {
                            if ($.trim(data.stat) == "success") {
                                layer.msg('删除商户成功');
                            } else {
                                layer.msg('删除失败,操作失败请联系管理员', {icon: 5});
                            }
                        },
                        error:function(data){
                            layer.msg("操作失败请联系管理员")
                        }
                    });
                });
            } else if(layEvent === 'edit'){
                layer.msg('编辑操作');
            }
        });


        //监听提交
        form.on('submit(demo1)', function(data){
            var phone =  $('#phone').val();
            $.ajax({
                type:"GET",
                url:"${ctx}/app/appYearCheckIndent/addYearCheckMerchants?phone="+ phone +"",
                success:function (data) {
                    if ($.trim(data.stat) == "success") {
                        layer.msg('添加商户成功');
                    } else if ($.trim(data.stat) == "address") {
                        layer.msg('添加失败,该商户没有添加地址信息', {icon: 5});
                    } else {
                        layer.msg('添加失败,没有查询到该商户', {icon: 5});
                    }
                },
                error:function(data){
                    layer.msg("操作失败请联系管理员")
                }
            });
            return false;
        });

    });



    // function trys() {
    //     $.ajax({
    //         type:"GET",
    //         url:"${ctx}/app/appIndent/trys",
    //         success:function (data) {
    //             if ($.trim(data.stat) == "success") {
    //                 layer.msg('添加商户成功');
