<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>play</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../../static/common/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../../static/common/jqueryui/jquery-ui.css">
</head>
<body>
<br>
<br>
<form class="layui-form" action="">
    <div class="layui-inline">
        <label class="layui-form-label">添加救援商</label>
        <div class="layui-input-inline">
            <input type="tel" name="phone" id="phone" lay-verify="required|phone" autocomplete="off" class="layui-input">
        </div>
    </div>
    <button type="submit" class="layui-btn" style="margin-left: 20px" lay-submit="" lay-filter="demo1">提交</button>
</form>

<table class="layui-hide" id="demo" lay-filter="test"></table>

<script type="text/html" id="barDemo">
    <a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del">删除</a>
</script>
<script src="../../../static/common/layui/layui.js" charset="utf-8"></script>
<script src="https://code.jquery.com/jquery-1.12.4.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<script>
    layui.use(['form','table'], function(){
        var form = layui.form
            ,layer = layui.layer
            ,table = layui.table;


        //执行一个 table 实例
        table.render({
            elem: '#demo'
            ,height: 720
            ,url: '${ctx}/app/appBUser/findGeoMerchants' //数据接口
            ,title: '用户表'
            ,page: true //开启分页
            ,cols: [[ //表头
                {type: 'checkbox', fixed: 'left'}
                ,{field: 'id', title: 'ID', width:80, sort: true, fixed: 'left',}
                ,{field: 'merchantsName', title: '商户名', width:300}
                ,{field: 'address', title: '地址', width: 500, sort: true}
                ,{field: 'lng', title: '经度', width:300, sort: true}
                ,{field: 'lat', title: '纬度', width:300, sort: true}
                ,{fixed: 'right', width: 165, align:'center', toolbar: '#barDemo'}
            ]]
        });

        //监听头工具栏事件
        table.on('toolbar(test)', function(obj){
            var checkStatus = table.checkStatus(obj.config.id)
                ,data = checkStatus.data; //获取选中的数据
            switch(obj.event){
                case 'add':
                    layer.msg('添加');
                    break;
                case 'update':
                    if(data.length === 0){
                        layer.msg('请选择一行');
                    } else if(data.length > 1){
                        layer.msg('只能同时编辑一个');
                    } else {
                        layer.alert('编辑 [id]：'+ checkStatus.data[0].id);
                    }
                    break;
                case 'delete':
                    if(data.length === 0){
                        layer.msg('请选择一行');
                    } else {
                        layer.msg('删除');
                    }
                    break;
            };
        });

        //监听行工具事件
        table.on('tool(test)', function(obj){ //注：tool 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
            var data = obj.data //获得当前行数据
                ,layEvent = obj.event; //获得 lay-event 对应的值
            if(layEvent === 'detail'){
                layer.msg('查看操作');
            } else if(layEvent === 'del'){
                layer.confirm('真的删除行么', function(index){
                    obj.del(); //删除对应行（tr）的DOM结构
                    layer.close(index);
                    //向服务端发送删除指令
                    $.ajax({
                        type:"GET",
                        url:"${ctx}/app/appBUser/delRescueMerchants?userBid="+data.id+"",
                        success:function (data) {
                            if ($.trim(data.stat) == "success") {
                                layer.msg('删除商户成功');
                            } else {
                                layer.msg('删除失败,操作失败请联系管理员', {icon: 5});
                            }
                        },
                        error:function(data){
                            layer.msg("操作失败请联系管理员")
                        }
                    });
                });
            } else if(layEvent === 'edit'){
                layer.msg('编辑操作');
            }
        });


        //监听提交
        form.on('submit(demo1)', function(data){
            var phone =  $('#phone').val();
            $.ajax({
                type:"GET",
                url:"${ctx}/app/appBUser/addRescueMerchants?phone="+ phone +"",
                success:function (data) {
                    if ($.trim(data.stat) == "success") {
                        layer.msg('添加商户成功');
                    } else if ($.trim(data.stat) == "address") {
                        layer.msg('添加失败,该商户没有添加地址信息', {icon: 5});
                    } else {
                        layer.msg('添加失败,没有查询到该商户', {icon: 5});
                    }
                },
                error:function(data){
                    layer.msg("操作失败请联系管理员")
                }
            });
            return false;
        });

    });
</script>
</body>
</html>
