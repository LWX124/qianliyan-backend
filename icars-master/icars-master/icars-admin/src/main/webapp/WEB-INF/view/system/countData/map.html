@layout("/common/_container.html"){
<style>
    html,body{
        width:100%;
        height:100%;
    }
    *{
        margin:0px;
        padding:0px;
    }
    body, button, input, select, textarea {
        font: 12px/16px Verdana, Helvetica, Arial, sans-serif;
    }
    p{
        width:603px;
        padding-top:3px;
        overflow:hidden;
    }
    .btn{
        width:142px;
    }
    #container{
        min-width:600px;
        min-height:767px;
    }
</style>
<body id="body">
<div class="row">
    <div class="col-sm-12">
        <div class="ibox float-e-margins">
            <div id="container"></div>
        </div>
    </div>
</div>
</body>

<script charset="utf-8" src="${ctxPath}/static/js/jquery.timers-1.2.js"></script>
<script charset="utf-8" src="https://map.qq.com/api/js?v=2.exp&key=JVEBZ-Z7CKQ-TOA5J-GKKUM-43L2K-PRBFO"></script>
<script src="${ctxPath}/static/modular/system/map/map.js"></script>
@}
