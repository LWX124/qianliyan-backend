<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>爱车士 - 登录</title>

    <link rel="shortcut icon" href="${ctxPath}/static/favicon.ico">
    <link href="${ctxPath}/static/css/bootstrap.min.css?v=3.3.6" rel="stylesheet">
    <link href="${ctxPath}/static/css/font-awesome.css?v=4.4.0" rel="stylesheet">
    <link href="${ctxPath}/static/css/style.css?v=4.1.0" rel="stylesheet">
    <script>if (window.top !== window.self) {
        window.top.location = window.location;
    }</script>
    <script src="${ctxPath}/static/js/jquery.min.js?v=2.1.4"></script>
    <script src="${ctxPath}/static/js/bootstrap.min.js?v=3.3.6"></script>
</head>

<body class="gray-bg" style="background-image: url('/static/img/login_bg.jpg');background-size: 100% 100%;">

<div class="middle-box text-center loginscreen" style="margin-left: 70%;padding-top: 99px;display: none" id="loginDiv">
    <div style="padding: 100px 0px;">
        <!--<div>-->
            <!--<h1 class="logo-name" style="font-size: 109px;font-weight: 600;">爱车士</h1>-->
        <!--</div>-->
        <br/>
        <h4 style="color: red;">${tips!}</h4>
        <form class="m-t" role="form" action="${ctxPath}/login" method="post" style="border: 1px solid transparent;background: rgba(0,0,0,.2);padding-top: 30px;padding-right: 9px;height: 400px;width: 345px;">
            <div class="form-group" style="background-image: url('/static/img/cheji_white_logo.png');height: 70px;background-size: 100% 100%;width: 140px;color: white;background-position-x: center;background-position-y: center;font-size: initial;background-repeat: no-repeat;margin-left: 110px;font-family: Microsoft Yahei;font-weight: bolder;">

            </div>
            <div class="form-group">
                <label class="col-sm-2 control-label">
                <span style="height: 30px;background-image: url('/static/img/username.png');display: block;width: 30px;"></span>
                </label>
                <div class="col-sm-10">
                <input type="text" name="username" class="form-control" placeholder="用户名" required="">
                </div>
            </div>
            <div class="form-group" style="margin-top: 75px;">
                <label class="col-sm-2 control-label">
                    <span style="height: 30px;background-image: url('/static/img/password.png');display: block;width: 30px;"></span>
                </label>
                <div class="col-sm-10">
                <input type="password" name="password" class="form-control" placeholder="密码" required="">
                </div>
            </div>
            @if(kaptcha.getKaptchaOnOff() == true){
            <div class="form-group" style="float: left;">
                <div class="col-sm-8" style="padding-left: 0px; padding-right: 0px;">
                    <input class="form-control" type="text" name="kaptcha" placeholder="验证码" required="">
                </div>
                <div class="col-sm-4" style="padding-left: 0px; padding-right: 0px;">
                    <img src="${ctxPath}/kaptcha" id="kaptcha" width="100%" height="100%"/>
                </div>
            </div>
            @}
            <div class="form-group" style="float: left;margin-left: 14px;margin-top: 7px;">
                <div class="checkbox" style="text-align: left">
                    <label style="color: white;">
                        <input type="checkbox" name="remember" style="margin-top: 2px;">记住我
                    </label>
                </div>
            </div>
            <div class="form-group" style="padding-left: 15px;padding-right: 15px;">
            <button type="submit" class="btn btn-primary block full-width m-b" style="background: #0AE;">登 录</button>
            </div>
        </form>
    </div>

</div>
<!--<div style="width: 322px;margin:0 auto;padding:20px 0;">-->
    <!--<a target="_blank" href="http://www.beian.gov.cn/portal/registerSystemInfo?recordcode=51010402000602" style="display:inline-block;text-decoration:none;height:20px;line-height:20px;">-->

    <!--</a>-->
<!--</div>-->
<script>
    $(function () {
        $("#kaptcha").on('click', function () {
            $("#kaptcha").attr('src', '${ctxPath}/kaptcha?' + Math.floor(Math.random() * 100)).fadeIn();
        });
        $('#loginDiv').fadeIn(1000);
    });
</script>

</body>
</html>
