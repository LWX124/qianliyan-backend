<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../../../static/common/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../../static/common/jqueryui/jquery-ui.css">
</head>
<body>
<input type="hidden" value="${imgSrc}"   id="method1">
<input type="hidden" value="${carId}"   id="method2">
<div class="layui-upload">
    <button class = "layui-btn" id="replaceImg" type="button">替换图片</button>
    <div class="layui-upload-list" style="display: inline-block">
        <img class="layui-upload-img" id="replace1">
        <p id = replaceTest1></p>
    </div>
</div>
<script src="../../../static/common/layui/layui.js" charset="utf-8"></script>
<script src="../../../static/common/js/jquery-1.11.1.min.js"></script>
<script src="http://www.jq22.com/jquery/jquery-ui-1.11.0.js"></script>
<script type="text/javascript" src="../../../static/common/layui/xm-select.js"></script>

<script>

    var carId = '${carId}';
    var imgSrc = '${imgSrc}';
    layui.use(['upload'], function(){
        var $ = layui.jquery
            ,upload = layui.upload;

        //普通图片上传
        var uploadInst = upload.render({
            elem: '#replaceImg'
            ,url: '${ctx}/app/appAuctionUp/uploadReplace?imgSrc='+imgSrc+'&carId='+carId+''       //改成您自己的上传接口
            ,before: function(obj){
                //预读本地文件示例，不支持ie8
                obj.preview(function(index, file, result){
                    $('#replace1').attr('src', result); //图片链接（base64）
                });
            }
            ,done: function(res){
                //如果上传失败
                if(res.code > 0){
                    return layer.msg('上传失败');
                }else {
                    //上传成功
                    return layer.msg('文件上传成功');
                }
            }
            ,error: function(){
                //演示失败状态，并实现重传
                var demoText = $('#replaceTest1');
                demoText.html('<span style="color: #FF5722;">上传失败</span> <a class="layui-btn layui-btn-xs demo-reload">重试</a>');
                demoText.find('.demo-reload').on('click', function(){
                    uploadInst.upload();
                });
            }
        });



    });





</script>
</body>
</html>
